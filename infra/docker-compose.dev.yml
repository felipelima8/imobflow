version: "3.9"

services:
  # ===========================
  # Backend (Java Spring Boot)
  # ===========================
  backend:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    ports:
      - "8080:8080"
    entrypoint: ""
    command: mvn spring-boot:run -Dspring-boot.run.profiles=dev
    volumes:
      - ../backend:/app
      - ~/.m2:/root/.m2
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: imobflow
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      UNLEASH_URL: http://unleash:4242/api
      UNLEASH_API_KEY: "${UNLEASH_API_TOKEN}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - imobflow-net

  # ===========================
  # AI Engine (Python FastAPI)
  # ===========================
  ai-engine:
    build:
      context: ../ai-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../ai-engine:/app
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - imobflow-net

  # ===========================
  # Frontend (Next.js)
  # ===========================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - imobflow-net

  # ===========================
  # PostgreSQL 16
  # ===========================
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_MULTIPLE_DATABASES: infrastructure_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imobflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - imobflow-net

  # ===========================
  # Redis 7
  # ===========================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - imobflow-net

  # ===========================
  # RabbitMQ
  # ===========================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - imobflow-net

  # ===========================
  # Keycloak (Auth)
  # ===========================
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import/:ro
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/infrastructure_db
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - imobflow-net

  # ===========================
  # MinIO (S3-compatible storage)
  # ===========================
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    networks:
      - imobflow-net

  # ===========================
  # Unleash (Feature Flags)
  # ===========================
  unleash:
    image: unleashorg/unleash-server:latest
    ports:
      - "4242:4242"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/infrastructure_db
      DATABASE_SSL: "false"
      INIT_ADMIN_API_TOKENS: "${UNLEASH_API_TOKEN}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - imobflow-net

  # ===========================
  # Mailpit (SMTP for testing)
  # ===========================
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - imobflow-net

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  miniodata:

networks:
  imobflow-net:
    driver: bridge
