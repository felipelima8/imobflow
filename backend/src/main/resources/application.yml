spring:
  application:
    name: imobflow-backend
  profiles:
    active: dev

  # === Database ===
  datasource:
    url: jdbc:postgresql://localhost:5432/imobflow
    username: imobflow
    password: imobflow_dev_2026
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

  # === Redis ===
  data:
    redis:
      host: localhost
      port: 6379

  # === RabbitMQ ===
  rabbitmq:
    host: localhost
    port: 5672
    username: imobflow
    password: imobflow_dev_2026

  # === Mail ===
  mail:
    host: localhost
    port: 1025

  # === Security (Keycloak OIDC) ===
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/imobflow

# === Server ===
server:
  port: 8080

# === S3 / MinIO ===
s3:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: imobflow
  region: us-east-1

# === Keycloak ===
keycloak:
  url: http://localhost:8180
  realm: imobflow

# === Unleash ===
unleash:
  url: http://localhost:4242/api
  api-key: "default:development.unleash-insecure-api-token"

# === Actuator ===
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# === OpenAPI ===
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# === Logging ===
logging:
  level:
    com.imobflow: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
